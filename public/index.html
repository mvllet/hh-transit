<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>HH Transit</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="shell">
        <header id="header">
            <span id="app-title">HH Transit</span>
            <button class="tab-btn active" id="tab-monitor" onclick="switchTab('monitor')">Monitor</button>
            <button class="tab-btn" id="tab-planner" onclick="switchTab('planner')">Planner</button>
            <div id="header-right">
                <span id="board-label"></span>
                <span id="live-clock">--:--</span>
            </div>
        </header>

        <main id="content">
            <div class="tab-panel active" id="panel-monitor">
                <div id="monitor-content">
                    <div class="board-message">Loading data...</div>
                </div>
            </div>
            <div class="tab-panel" id="panel-planner">
                <div id="planner-content">
                    <div class="board-message">Press S to plan a route</div>
                </div>
            </div>
        </main>

        <footer id="footer">
            <span class="fkey">1</span><span class="flabel">Monitor</span>
            <span class="fkey">2</span><span class="flabel">Planner</span>
            <span class="fkey">S</span><span class="flabel">Search</span>
            <span class="fkey">R</span><span class="flabel">Refresh</span>
            <span id="sync-status" class="dim">--</span>
        </footer>
    </div>

    <div class="modal-overlay" id="modal-overlay" onclick="closeModal()"></div>

    <div class="modal" id="search-modal">
        <div class="modal-title">
            <span>Search Station</span>
            <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="field">
            <div class="field-label">Station</div>
            <input type="text" id="search-input" placeholder="e.g. Hamburg Hbf" autocomplete="off">
        </div>
        <button class="modal-btn" onclick="submitSearch()">Search</button>
    </div>

    <div class="modal" id="planner-modal">
        <div class="modal-title">
            <span>Plan Journey</span>
            <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="field">
            <div class="field-label">From</div>
            <input type="text" id="input-from" placeholder="Origin..." autocomplete="off">
        </div>
        <div class="field">
            <div class="field-label">To</div>
            <input type="text" id="input-to" placeholder="Destination..." autocomplete="off">
        </div>
        <button class="modal-btn" onclick="submitPlanner()">Plan Route</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
