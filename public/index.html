<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Departure Monitor</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body {
            background: #0a0a0a;
            color: #e5e5e5;
            font-family: monospace;
            padding: 0 20px;
            margin: 0;
            overflow-y: auto;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #444;
            padding: 25px 0 15px 0;
            position: sticky;
            top: 0;
            background: #0a0a0a;
            z-index: 100;
        }

        #station-title {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #live-clock {
            font-size: 28px;
            font-weight: bold;
            color: #aaa;
            padding-left: 20px;
        }

        #board {
            padding-bottom: 100px;
            width: 100%;
        }

        .departures {
            display: flex;
            border-bottom: 1px solid #222;
            padding: 18px 0;
            font-size: 1.4rem;
            align-items: center;
        }

        .line {
            width: 120px;
            font-weight: bold;
        }

        .dir {
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 15px;
        }

        .time {
            width: 120px;
            text-align: right;
        }

        .delay {
            width: 90px;
            text-align: right;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .red { color: #ff4444; }
        .green { color: #44ff44; }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #111;
            padding: 15px 0; 
            color: #888;
            font-size: 16px;
            border-top: 2px solid #444;
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            align-items: center;
            justify-items: center;
            z-index: 200;
        }

        .footer-btn {
            cursor: pointer;
            padding: 12px 0;
            width: 80%;
            text-align: center;
            border: 1px solid #444;
            background: #1a1a1a;
            text-transform: uppercase;
            font-weight: bold;
            font-family: monospace;
            transition: all 0.1s;
        }

        #sync-status {
            font-weight: bold;
            letter-spacing: 1px;
            text-align: center;
            width: 100%;
        }

        #search-modal, #map-modal {
            display: none;
            position: fixed;
            top: 15%;
            left: 50%;
            transform: translate(-50%, 0);
            background: #0a0a0a;
            border: 3px solid #fdb913;
            padding: 30px;
            z-index: 1000;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 1);
        }

        #map-modal {
            max-width: 800px;
            height: 60vh;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 900;
        }

        input {
            background: #1a1a1a;
            border: 1px solid #444;
            color: #fff;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            font-family: monospace;
            font-weight: bold;
            font-size: 22px;
            outline: none;
        }

        input:focus {
            border-color: #fdb913;
        }

        .location-row {
            font-size: 15px;
            color: #fdb913;
            padding: 5px 0 10px 120px;
            margin-top: -15px;
        }
        
        #map-container {
            width: 100%;
            height: calc(100% - 50px);
            border: 1px solid #444;
            background: #1a1a1a;
        }

        .map-header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fdb913;
            font-weight: bold;
            font-size: 1.4rem;
        }

        .close-map-btn {
            cursor: pointer;
            color: #aaa;
            font-size: 1.2rem;
        }

        .close-map-btn:hover {
            color: #fff;
        }
    </style>
</head>
<body>

    <div id="modal-overlay" class="modal-overlay" onclick="closeAllModals()"></div>

    <header>
        <h1 id="station-title">LOADING...</h1>
        <div id="live-clock">00:00</div>
    </header>

    <main id="board"></main>

    <div id="map-modal">
        <div class="map-header">
            <span id="map-info">LIVE POSITION</span>
            <span class="close-map-btn" onclick="closeMap()">Close [ESC]</span>
        </div>
        <div id="map-container"></div>
    </div>

    <footer>
        <div class="footer-btn" onclick="openSearch()">Search [S]</div>
        <div class="footer-btn" onclick="updateDashboard()">Refresh [R]</div>
        <div id="sync-status">LIVE</div>
    </footer>

    <div id="search-modal">
        <div style="color: #fdb913; margin-bottom: 20px; font-weight: bold; font-size: 1.4rem;">
            STATION SEARCH
        </div>
        <input type="text" id="search-input" placeholder="Enter station name..." autocomplete="off" />
    </div>

    <script>
        const State = {
            currentStation: null,
            refreshInterval: 30000,
            map: null,
            marker: null
        };

        function normalizeStationName(name) {
            if (!name) return "";
            
            let formatted = name
                .replace(/-/g, " ")
                .replace(/\//g, " ")
                .replace(/\(/g, " (")
                .replace(/\)/g, ") ");

            const hubs = ["hbf", "airport", "altona", "dammtor", "harburg"];
            if (hubs.some(hub => formatted.toLowerCase().includes(hub))) {
                return formatted.replace(/\s+/g, " ").trim();
            }

            return formatted.split(/\s+/)
                .filter(word => !["hamburg", "hh"].includes(word.toLowerCase().trim()))
                .join(" ")
                .trim();
        }

        function getLineDesign(dep) {
            const name = (dep.line?.name || "").replace(/^BUS\s+/i, "");
            
            if (name.startsWith("U")) return { name, color: "#006192" };
            if (name.startsWith("S")) return { name, color: "#2ea13d" };
            if (name.startsWith("A")) return { name, color: "#fdb913" };
            if (name.startsWith("ICE")) return { name, color: "#ffffff" };
            if (name.match(/^(RE|RB)/i)) return { name, color: "#af00af" };
            
            return { name, color: "#e2001a" };
        }

        async function performSearch(query, updateUrl = true) {
            const status = document.getElementById("sync-status");
            status.innerText = "SEARCHING...";

            try {
                const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const results = await res.json();
                const station = results.find(r => r.type === "station" || r.type === "stop");

                if (station) {
                    State.currentStation = station;
                    if (updateUrl) {
                        const newUrl = new URL(window.location);
                        newUrl.searchParams.set('q', query);
                        window.history.pushState({}, '', newUrl);
                    }
                    updateDashboard();
                } else {
                    status.innerText = "NOT FOUND";
                }
            } catch (e) {
                status.innerText = "SEARCH ERROR";
            }
        }

        async function updateDashboard() {
            if (!State.currentStation) return;
            
            const status = document.getElementById("sync-status");
            status.innerText = "UPDATING...";

            try {
                const res = await fetch(`/api/departures?stationId=${State.currentStation.id}`);
                const departures = await res.json();
                
                departures.sort((a, b) => {
                    const timeA = new Date(a.when || a.plannedWhen);
                    const timeB = new Date(b.when || b.plannedWhen);
                    return timeA - timeB;
                });

                document.getElementById("station-title").innerText = 
                    normalizeStationName(State.currentStation.name);

                const board = document.getElementById("board");
                board.innerHTML = departures.map(dep => {
                    const design = getLineDesign(dep);
                    const time = new Date(dep.when || dep.plannedWhen).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const delay = dep.delay !== null ? Math.round(dep.delay / 60) : 0;
                    
                    let locationHTML = "";
                    const pos = dep.location || dep.currentTripPosition;

                    if (pos && pos.latitude && pos.longitude) {
                        const lat = pos.latitude;
                        const lon = pos.longitude;
                        
                        locationHTML = `
                            <div class="location-row" onclick="openMap(${lat}, ${lon})" style="cursor:pointer">
                                <span>Show on map</span>
                            </div>`;
                    }

                    return `
                        <div style="border-bottom: 1px solid #222;">
                            <div class="departures" style="border-bottom: none;">
                                <div class="line" style="color: ${design.color}">${design.name}</div>
                                <div class="dir">${normalizeStationName(dep.direction)}</div>
                                <div class="time">${time}</div>
                                <div class="delay ${delay > 0 ? 'red' : 'green'}">
                                    ${delay > 0 ? '+' + delay + 'm' : 'OK'}
                                </div>
                            </div>
                            ${locationHTML}
                        </div>`;
                }).join("");

                status.innerText = "LIVE";
            } catch (e) {
                status.innerText = "ERROR";
            }
        }

        var busIcon = L.icon({
            iconUrl: "bus.png",
            iconSize: [50, 50],
            iconAnchor: [25, 40]
        });

        function openMap(lat, lon) {
            document.getElementById("map-modal").style.display = "block";
            document.getElementById("modal-overlay").style.display = "block";

            setTimeout(() => {
                if (!State.map) {
                    State.map = L.map('map-container').setView([lat, lon], 15);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                        attribution: '© OpenStreetMap'
                    }).addTo(State.map);
                    State.marker = L.marker([lat, lon], {icon: busIcon}).addTo(State.map);
                } else {
                    State.map.setView([lat, lon], 15);
                    State.marker.setLatLng([lat, lon]);
                    State.map.invalidateSize();
                }
            }, 200);
        }

        function closeMap() {
            document.getElementById("map-modal").style.display = "none";
            document.getElementById("modal-overlay").style.display = "none";
        }

        function openSearch() {
            document.getElementById("search-modal").style.display = "block";
            document.getElementById("modal-overlay").style.display = "block";
            document.getElementById("search-input").focus();
        }

        function closeSearch() {
            document.getElementById("search-modal").style.display = "none";
            document.getElementById("modal-overlay").style.display = "none";
            document.getElementById("search-input").value = "";
        }

        function closeAllModals() {
            closeSearch();
            closeMap();
        }

        window.addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
                closeAllModals();
                return;
            }

            const isModalOpen = document.getElementById("search-modal").style.display === "block" || 
                               document.getElementById("map-modal").style.display === "block";
            
            if (isModalOpen) return;

            if (e.key.toLowerCase() === 's') {
                e.preventDefault();
                openSearch();
            }
            if (e.key.toLowerCase() === 'r') {
                updateDashboard();
            }
        });

        document.getElementById("search-input").addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                const query = e.target.value.trim();
                if (query) performSearch(query);
                closeSearch();
            }
        });

        setInterval(() => {
            document.getElementById("live-clock").innerText = 
                new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }, 1000);

        const urlParams = new URLSearchParams(window.location.search);
        performSearch(urlParams.get('q') || "Hamburg Hbf", false);
        
        setInterval(updateDashboard, State.refreshInterval);
    </script>
</body>
</html>
