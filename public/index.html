<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Departure Monitor</title>
    <style>
        body {
            background: #0a0a0a;
            color: #e5e5e5;
            font-family: monospace;
            padding: 0 20px;
            margin: 0;
            overflow-y: auto;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #444;
            padding: 25px 0 15px 0;
            position: sticky;
            top: 0;
            background: #0a0a0a;
            z-index: 100;
        }

        #station-title {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #live-clock {
            font-size: 28px;
            font-weight: bold;
            color: #aaa;
            padding-left: 20px;
        }

        #board {
            padding-bottom: 100px;
            width: 100%;
        }

        .departures {
            display: flex;
            border-bottom: 1px solid #222;
            padding: 18px 0;
            font-size: 1.4rem;
            align-items: center;
        }

        .line {
            width: 120px;
            font-weight: bold;
        }

        .dir {
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 15px;
        }

        .time {
            width: 120px;
            text-align: right;
        }

        .delay {
            width: 90px;
            text-align: right;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .red { color: #ff4444; }
        .green { color: #44ff44; }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #111;
            padding: 20px 0;
            color: #888;
            font-size: 18px;
            border-top: 2px solid #444;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 200;
        }

        .footer-btn {
            cursor: pointer;
            padding: 10px 25px;
            border: 1px solid #444;
            background: #1a1a1a;
            text-transform: uppercase;
            font-weight: bold;
        }

        .footer-btn:active {
            background: #fdb913;
            color: #000;
            border-color: #fdb913;
        }

        #search-modal {
            display: none;
            position: fixed;
            top: 15%;
            left: 50%;
            transform: translate(-50%, 0);
            background: #0a0a0a;
            border: 3px solid #fdb913;
            padding: 30px;
            z-index: 1000;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 1);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 900;
        }

        input {
            background: #1a1a1a;
            border: 1px solid #444;
            color: #fff;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            font-family: monospace;
            font-weight: bold;
            font-size: 22px;
            outline: none;
        }

        input:focus {
            border-color: #fdb913;
        }
    </style>
</head>
<body>

    <div id="modal-overlay" class="modal-overlay" onclick="closeSearch()"></div>

    <header>
        <h1 id="station-title">LOADING...</h1>
        <div id="live-clock">00:00</div>
    </header>

    <main id="board"></main>

    <footer>
        <div class="footer-btn" onclick="openSearch()">Search [S]</div>
        <div class="footer-btn" onclick="updateDashboard()">Refresh [R]</div>
        <div id="sync-status">LIVE</div>
    </footer>

    <div id="search-modal">
        <div style="color: #fdb913; margin-bottom: 20px; font-weight: bold; font-size: 1.4rem;">
            STATION SEARCH
        </div>
        <input type="text" id="search-input" placeholder="Enter station name..." autocomplete="off" />
    </div>

    <script>
        const State = {
            currentStation: null,
            refreshInterval: 30000
        };

        function normalizeStationName(name) {
            if (!name) return "";
            
            let formatted = name
                .replace(/-/g, " ")
                .replace(/\//g, " ")
                .replace(/\(/g, " (")
                .replace(/\)/g, ") ");

            const hubs = ["hbf", "airport", "altona", "dammtor", "harburg"];
            if (hubs.some(hub => formatted.toLowerCase().includes(hub))) {
                return formatted.replace(/\s+/g, " ").trim();
            }

            return formatted.split(/\s+/)
                .filter(word => !["hamburg", "hh"].includes(word.toLowerCase().trim()))
                .join(" ")
                .trim();
        }

        function getLineDesign(dep) {
            const name = (dep.line?.name || "").replace(/^BUS\s+/i, "");
            
            if (name.startsWith("U")) return { name, color: "#006192" };
            if (name.startsWith("S")) return { name, color: "#2ea13d" };
            if (name.startsWith("A")) return { name, color: "#fdb913" };
            if (name.startsWith("ICE")) return { name, color: "#ffffff" };
            if (name.match(/^(RE|RB)/i)) return { name, color: "#af00af" };
            
            return { name, color: "#e2001a" };
        }

        async function performSearch(query, updateUrl = true) {
            const status = document.getElementById("sync-status");
            status.innerText = "SEARCHING...";

            try {
                const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const results = await res.json();
                const station = results.find(r => r.type === "station" || r.type === "stop");

                if (station) {
                    State.currentStation = station;
                    if (updateUrl) {
                        const newUrl = new URL(window.location);
                        newUrl.searchParams.set('q', query);
                        window.history.pushState({}, '', newUrl);
                    }
                    updateDashboard();
                } else {
                    status.innerText = "NOT FOUND";
                }
            } catch (e) {
                status.innerText = "SEARCH ERROR";
            }
        }

        async function updateDashboard() {
            if (!State.currentStation) return;
            
            const status = document.getElementById("sync-status");
            status.innerText = "UPDATING...";

            try {
                const res = await fetch(`/api/departures?stationId=${State.currentStation.id}`);
                const departures = await res.json();
                
                departures.sort((a, b) => {
                    const timeA = new Date(a.when || a.plannedWhen);
                    const timeB = new Date(b.when || b.plannedWhen);
                    return timeA - timeB;
                });

                document.getElementById("station-title").innerText = 
                    normalizeStationName(State.currentStation.name);

                const board = document.getElementById("board");
                board.innerHTML = departures.map(dep => {
                    const design = getLineDesign(dep);
                    const time = new Date(dep.when || dep.plannedWhen)
                        .toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const delay = dep.delay !== null ? Math.round(dep.delay / 60) : 0;
                    
                    return `
                        <div class="departures">
                            <div class="line" style="color: ${design.color}">${design.name}</div>
                            <div class="dir">${normalizeStationName(dep.direction)}</div>
                            <div class="time">${time}</div>
                            <div class="delay ${delay > 0 ? 'red' : 'green'}">
                                ${delay > 0 ? '+' + delay + 'm' : 'OK'}
                            </div>
                        </div>`;
                }).join("");

                status.innerText = "LIVE";
            } catch (e) {
                status.innerText = "ERROR";
            }
        }

        function openSearch() {
            document.getElementById("search-modal").style.display = "block";
            document.getElementById("modal-overlay").style.display = "block";
            document.getElementById("search-input").focus();
        }

        function closeSearch() {
            document.getElementById("search-modal").style.display = "none";
            document.getElementById("modal-overlay").style.display = "none";
            document.getElementById("search-input").value = "";
        }

        window.addEventListener("keydown", (e) => {
            const isModalOpen = document.getElementById("search-modal").style.display === "block";
            
            if (isModalOpen) {
                if (e.key === "Escape") closeSearch();
                return;
            }

            if (e.key.toLowerCase() === 's') {
                e.preventDefault();
                openSearch();
            }
            if (e.key.toLowerCase() === 'r') {
                updateDashboard();
            }
        });

        document.getElementById("search-input").addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                const query = e.target.value.trim();
                if (query) performSearch(query);
                closeSearch();
            }
        });

        setInterval(() => {
            document.getElementById("live-clock").innerText = 
                new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }, 1000);

        const urlParams = new URLSearchParams(window.location.search);
        performSearch(urlParams.get('q') || "Hamburg Hbf", false);
        
        setInterval(updateDashboard, State.refreshInterval);
    </script>
</body>
</html>
