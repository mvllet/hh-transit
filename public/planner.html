<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Route Planner</title>

    <style>
        body {
            background: #0a0a0a;
            color: #e5e5e5;
            font-family: monospace;
            padding: 0 20px;
            margin: 0;
            overflow-y: auto;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #444;
            padding: 25px 0 15px 0;
            position: sticky;
            top: 0;
            background: #0a0a0a;
            z-index: 100;
        }

        #station-title {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #live-clock {
            font-size: 28px;
            font-weight: bold;
            color: #aaa;
            padding-left: 20px;
        }

        #board {
            padding-bottom: 120px;
            width: 100%;
        }

        .journey-box {
            margin-top: 20px;
            margin-bottom: 40px;
            border: 1px solid #333;
            background: #0f0f0f;
        }

        .option-label {
            color: #fdb913;
            font-weight: bold;
            padding: 15px;
            border-bottom: 1px solid #444;
            text-transform: uppercase;
            font-size: 1.4rem;
            background: #151515;
        }

        .leg-row {
            display: grid;
            grid-template-columns: 150px 100px 1fr 100px 1fr 90px;
            border-bottom: 1px solid #222;
            padding: 18px 15px;
            font-size: 1.4rem;
            align-items: center;
        }

        .leg-row:last-child { border-bottom: none; }

        .line { font-weight: bold; }
        .time { font-weight: bold; }

        .path {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #aaa;
            padding: 0 10px;
        }

        .dest { padding-left: 0 !important; }

        .delay {
            text-align: right;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .red { color: #ff4444; }
        .green { color: #44ff44; }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #111;
            padding: 15px 0;
            color: #888;
            font-size: 16px;
            border-top: 2px solid #444;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            align-items: center;
            justify-items: center;
            z-index: 200;
        }

        .footer-btn {
            cursor: pointer;
            padding: 12px 0;
            width: 80%;
            text-align: center;
            border: 1px solid #444;
            background: #1a1a1a;
            text-transform: uppercase;
            font-weight: bold;
            font-family: monospace;
        }

        #sync-status {
            font-weight: bold;
            letter-spacing: 1px;
            text-align: center;
            width: 100%;
        }

        #search-modal {
            display: none;
            position: fixed;
            top: 15%;
            left: 50%;
            transform: translate(-50%, 0);
            background: #0a0a0a;
            border: 3px solid #fdb913;
            padding: 30px;
            z-index: 1000;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            box-sizing: border-box;
        }

        #search-modal .map-header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fdb913;
            font-weight: bold;
            font-size: 1.4rem;
        }

        #search-modal .close-map-btn {
            cursor: pointer;
            color: #aaa;
            font-size: 1.2rem;
        }

        #search-modal .close-map-btn:hover { color: #fff; }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 900;
        }

        .field { margin-bottom: 20px; }

        .label {
            color: #fdb913;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        input {
            background: #1a1a1a;
            border: 1px solid #444;
            color: #fff;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            font-family: monospace;
            font-weight: bold;
            font-size: 22px;
            outline: none;
        }

        input:focus { border-color: #fdb913; }

        .plan-btn {
            width: 100%;
            margin-top: 20px;
            box-sizing: border-box;
        }

        @media screen and (max-width: 480px) {
            header { padding: 10px 0 8px 0 !important; }
            #station-title { font-size: 1rem !important; letter-spacing: 1px; }
            #live-clock { font-size: 18px !important; padding-left: 10px !important; }
            #board { padding-bottom: 90px !important; }
            .journey-box { margin-top: 15px !important; margin-bottom: 25px !important; }
            .option-label { font-size: 1rem !important; padding: 10px !important; }
            .leg-row {
                display: grid !important;
                grid-template-areas:
                    "line delay"
                    "dest dep"
                    "origin arr";
                grid-template-columns: 1fr auto;
                gap: 4px;
                padding: 12px 10px !important;
                font-size: 1rem !important;
            }
            .leg-row > :nth-child(1) { grid-area: line; }
            .leg-row > :nth-child(6) { grid-area: delay; text-align: right; }
            .leg-row > :nth-child(3) { grid-area: dest; padding: 0 !important; font-size: 0.9rem; color: #bbb; }
            .leg-row > :nth-child(2) { grid-area: dep; text-align: right; }
            .leg-row > :nth-child(5) { grid-area: origin; padding: 0 !important; font-size: 0.9rem; color: #bbb; }
            .leg-row > :nth-child(4) { grid-area: arr; text-align: right; }
            footer { font-size: 11px !important; }
            .footer-btn { padding: 6px 0 !important; margin: 0 5px !important; width: 90% !important; font-size: 10px !important; }
            #sync-status { font-size: 10px !important; }
            #search-modal {
                top: 0 !important;
                left: 0 !important;
                transform: none !important;
                width: 100% !important;
                height: 100% !important;
                padding: 60px 20px 20px 20px !important;
                border: none !important;
            }
            input { font-size: 1.2rem !important; padding: 15px !important; background: #111 !important; }
            .plan-btn {
                display: block;
                width: 100% !important;
                box-sizing: border-box;
                text-align: center;
                padding: 12px 0;
                margin: 0 !important;
                background: #1a1a1a;
                color: #fff;
                font-weight: bold;
                text-transform: uppercase;
                border: 1px solid #444;
                font-family: monospace;
                cursor: pointer;
                transition: all 0.1s;
            }
            .plan-btn:hover { background: #222; border-color: #fdb913; }
        }
    </style>
</head>
<body>

    <div id="modal-overlay" class="modal-overlay" onclick="closeSearch()"></div>

    <header>
        <h1 id="station-title">ROUTE PLANNER</h1>
        <div id="live-clock">00:00</div>
    </header>

    <main id="board"></main>

    <footer>
        <div class="footer-btn" onclick="openSearch()">Search [S]</div>
        <div class="footer-btn" onclick="refreshNow()">Refresh [R]</div>
        <div id="sync-status">READY</div>
    </footer>

    <div id="search-modal">
        <div class="map-header">
            <span id="search-info">STATION SEARCH</span>
            <span class="close-map-btn" onclick="closeSearch()">Close [ESC]</span>
        </div>
        <div style="margin-top: 20px;">
            <div class="field">
                <div class="label">From:</div>
                <input type="text" id="input-from" placeholder="Origin..." autocomplete="off" />
            </div>
            <div class="field">
                <div class="label">To:</div>
                <input type="text" id="input-to" placeholder="Destination..." autocomplete="off" />
            </div>
            <div class="footer-btn plan-btn" onclick="triggerSearch()">Plan Route</div>
        </div>
    </div>

    <script>
        const App = {
            lastFrom: "",
            lastTo: ""
        };

        const ui = {
            stationTitle: document.getElementById("station-title"),
            clock: document.getElementById("live-clock"),
            board: document.getElementById("board"),
            status: document.getElementById("sync-status"),
            fromInput: document.getElementById("input-from"),
            toInput: document.getElementById("input-to"),
            modalOverlay: document.getElementById("modal-overlay"),
            searchModal: document.getElementById("search-modal")
        };

        function normalizeStationName(name) {
            if (!name) return "";
            let s = String(name)
                .replace(/-/g, " ")
                .replace(/\//g, " ")
                .replace(/\s*\(\s*/g, " (")
                .replace(/\s*\)\s*/g, ") ");
            s = s.replace(/\s+/g, " ").trim();
            const hubs = ["hbf", "airport", "altona", "dammtor", "harburg"];
            if (hubs.some(h => s.toLowerCase().includes(h))) return s;
            return s.split(/\s+/).filter(w => !["hamburg", "hh"].includes(w.toLowerCase())).join(" ").trim();
        }

        function getLineStyle(leg) {
            const raw = String((leg && leg.line && leg.line.name) || "WALK");
            const name = raw.replace(/^BUS\s+/i, "");
            if (name === "WALK") return { text: "WALK", color: "#777" };
            if (name.startsWith("U")) return { text: name, color: "#006192" };
            if (name.startsWith("S")) return { text: name, color: "#2ea13d" };
            if (name.startsWith("A")) return { text: name, color: "#fdb913" };
            if (name.startsWith("ICE")) return { text: name, color: "#ffffff" };
            if (/^(RE|RB)/i.test(name)) return { text: name, color: "#af00af" };
            return { text: name || "-", color: "#e2001a" };
        }

        function formatTime(iso) {
            if (!iso) return "-";
            const d = new Date(iso);
            if (isNaN(d)) return "-";
            return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        }

        function computeDelayMinutes(seconds) {
            if (seconds == null) return 0;
            const mins = Math.round(Number(seconds) / 60);
            return isFinite(mins) ? mins : 0;
        }

        async function calculateRoute(from, to, updateUrl = true) {
            if (!from || !to) return;
            App.lastFrom = from;
            App.lastTo = to;
            ui.status.innerText = "PLANNING...";
            try {
                const res = await fetch(`/api/planner?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`);
                if (!res.ok) throw new Error("planner failed");
                const data = await res.json();
                if (updateUrl) {
                    const u = new URL(window.location);
                    u.searchParams.set("from", from);
                    u.searchParams.set("to", to);
                    window.history.pushState({}, "", u);
                }
                const offFrom = data && data.origin && data.origin.name ? data.origin.name : from;
                const offTo = data && data.destination && data.destination.name ? data.destination.name : to;
                ui.stationTitle.innerText = `${normalizeStationName(offFrom)} >> ${normalizeStationName(offTo)}`;
                const journeys = Array.isArray(data && data.journeys) ? data.journeys.slice(0, 4) : [];
                renderResults(journeys);
                ui.status.innerText = "LIVE";
            } catch (e) {
                ui.status.innerText = "ERROR";
            }
        }

        function renderResults(journeys) {
            ui.board.innerHTML = "";
            if (!Array.isArray(journeys) || journeys.length === 0) {
                const empty = document.createElement("div");
                empty.style.padding = "20px 0";
                empty.textContent = "No routes";
                ui.board.appendChild(empty);
                return;
            }
            const frag = document.createDocumentFragment();
            journeys.forEach((j, idx) => {
                const legs = Array.isArray(j.legs) ? j.legs : [];
                const first = legs[0];
                const last = legs[legs.length - 1];
                const duration = first && last ? Math.round((new Date(last.arrival) - new Date(first.departure)) / 60000) : 0;
                const transfers = legs.filter(l => l.line).length - 1;
                const box = document.createElement("div");
                box.className = "journey-box";
                const label = document.createElement("div");
                label.className = "option-label";
                label.textContent = `Option ${idx + 1} (${duration} MIN, ${Math.max(0, transfers)} TRANSFERS)`;
                box.appendChild(label);
                legs.forEach(leg => {
                    const row = document.createElement("div");
                    row.className = "leg-row";
                    const style = getLineStyle(leg);
                    const lineDiv = document.createElement("div");
                    lineDiv.className = "line";
                    lineDiv.textContent = style.text;
                    lineDiv.style.color = style.color;
                    const depTime = document.createElement("div");
                    depTime.className = "time";
                    depTime.textContent = formatTime(leg.departure);
                    const origin = document.createElement("div");
                    origin.className = "path";
                    origin.textContent = leg.origin && leg.origin.name ? normalizeStationName(leg.origin.name) : "-";
                    const arrTime = document.createElement("div");
                    arrTime.className = "time";
                    arrTime.textContent = formatTime(leg.arrival);
                    const dest = document.createElement("div");
                    dest.className = "path";
                    dest.textContent = leg.destination && leg.destination.name ? normalizeStationName(leg.destination.name) : "-";
                    const delayMinutes = computeDelayMinutes(leg.departureDelay);
                    const delayDiv = document.createElement("div");
                    delayDiv.className = "delay " + (delayMinutes > 0 ? "red" : "green");
                    delayDiv.textContent = delayMinutes > 0 ? `+${delayMinutes}m` : "OK";
                    row.appendChild(lineDiv);
                    row.appendChild(depTime);
                    row.appendChild(origin);
                    row.appendChild(arrTime);
                    row.appendChild(dest);
                    row.appendChild(delayDiv);
                    box.appendChild(row);
                });
                frag.appendChild(box);
            });
            ui.board.appendChild(frag);
        }

        function openSearch() {
            ui.searchModal.style.display = "block";
            ui.modalOverlay.style.display = "block";
            setTimeout(() => ui.fromInput.focus(), 100);
        }

        function closeSearch() {
            ui.searchModal.style.display = "none";
            ui.modalOverlay.style.display = "none";
            ui.fromInput.value = "";
            ui.toInput.value = "";
            if (document.activeElement) document.activeElement.blur();
        }

        function triggerSearch() {
            const f = ui.fromInput.value.trim();
            const t = ui.toInput.value.trim();
            if (!f || !t) return;
            calculateRoute(f, t);
            closeSearch();
        }

        function refreshNow() {
            if (App.lastFrom && App.lastTo) calculateRoute(App.lastFrom, App.lastTo);
        }

        ui.fromInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                ui.toInput.focus();
            }
        });

        ui.toInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                triggerSearch();
            }
        });

        window.addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
                closeSearch();
                return;
            }
            const modalOpen = ui.searchModal.style.display === "block";
            if (modalOpen) {
                if (e.key === "Enter") triggerSearch();
                return;
            }
            const k = e.key.toLowerCase();
            if (k === "s") {
                e.preventDefault();
                openSearch();
            }
            if (k === "r") {
                refreshNow();
            }
        });

        function updateClock() {
            ui.clock.innerText = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        }

        updateClock();
        setInterval(updateClock, 1000);

        const params = new URLSearchParams(window.location.search);
        const fromParam = params.get("from");
        const toParam = params.get("to");
        if (fromParam && toParam) {
            calculateRoute(fromParam, toParam, false);
        } else {
            openSearch();
        }
    </script>
</body>
</html>
