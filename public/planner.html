<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Route Planner</title>
    <style>
        body {
            background: #0a0a0a;
            color: #e5e5e5;
            font-family: monospace;
            padding: 0 20px;
            margin: 0;
            overflow-y: auto;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #444;
            padding: 25px 0 15px 0;
            position: sticky;
            top: 0;
            background: #0a0a0a;
            z-index: 100;
        }

        #station-title {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #live-clock {
            font-size: 28px;
            font-weight: bold;
            color: #aaa;
            padding-left: 20px;
        }

        #board {
            padding-bottom: 120px;
            width: 100%;
        }

        .journey-box {
            margin-top: 20px;
            margin-bottom: 40px;
            border: 1px solid #333;
            background: #0f0f0f;
        }

        .option-label {
            color: #fdb913;
            font-weight: bold;
            padding: 15px;
            border-bottom: 1px solid #444;
            text-transform: uppercase;
            font-size: 1.4rem;
            background: #151515;
        }

        .leg-row {
            display: grid;
            grid-template-columns: 150px 100px 1fr 100px 1fr 90px;
            border-bottom: 1px solid #222;
            padding: 18px 15px;
            font-size: 1.4rem;
            align-items: center;
        }

        .leg-row:last-child {
            border-bottom: none;
        }

        .line {
            font-weight: bold;
        }

        .time {
            font-weight: bold;
        }

        .path {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #aaa;
            padding: 0 10px;
        }

        .delay {
            text-align: right;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .red { color: #ff4444; }
        .green { color: #44ff44; }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #111;
            padding: 20px 0;
            color: #888;
            font-size: 18px;
            border-top: 2px solid #444;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 200;
        }

        .footer-btn {
            cursor: pointer;
            padding: 10px 25px;
            border: 1px solid #444;
            background: #1a1a1a;
            text-transform: uppercase;
            font-weight: bold;
        }

        .footer-btn:active {
            background: #fdb913;
            color: #000;
            border-color: #fdb913;
        }

        #search-modal {
            display: none;
            position: fixed;
            top: 15%;
            left: 50%;
            transform: translate(-50%, 0);
            background: #0a0a0a;
            border: 3px solid #fdb913;
            padding: 30px;
            z-index: 1000;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 1);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 900;
        }

        .field {
            margin-bottom: 20px;
        }

        .label {
            color: #fdb913;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        input {
            background: #1a1a1a;
            border: 1px solid #444;
            color: #fff;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            font-family: monospace;
            font-weight: bold;
            font-size: 22px;
            outline: none;
        }

        input:focus {
            border-color: #fdb913;
        }

        @media (max-width: 1000px) {
            .leg-row {
                grid-template-columns: 100px 80px 1fr 80px 1fr 70px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <div id="modal-overlay" class="modal-overlay" onclick="closeSearch()"></div>

    <header>
        <h1 id="station-title">ROUTE PLANNER</h1>
        <div id="live-clock">00:00</div>
    </header>

    <main id="board"></main>

    <footer>
        <div class="footer-btn" onclick="openSearch()">Search [S]</div>
        <div class="footer-btn" onclick="refreshRoute()">Refresh [R]</div>
        <div id="sync-status">READY</div>
    </footer>

    <div id="search-modal">
        <div class="field">
            <div class="label">From:</div>
            <input type="text" id="input-from" placeholder="Origin..." autocomplete="off" />
        </div>
        <div class="field">
            <div class="label">To:</div>
            <input type="text" id="input-to" placeholder="Destination..." autocomplete="off" />
        </div>
        <div class="footer-btn" style="text-align: center; margin-top: 10px; width: 100%; box-sizing: border-box;" onclick="triggerSearch()">Plan Route</div>
    </div>

    <script>
        const State = {
            lastFrom: "",
            lastTo: ""
        };

        function normalizeStationName(name) {
            if (!name) return "";
            let formatted = name.replace(/-/g, " ").replace(/\//g, " ").replace(/\(/g, " (").replace(/\)/g, ") ");
            const hubs = ["hbf", "airport", "altona", "dammtor", "harburg"];
            if (hubs.some(hub => formatted.toLowerCase().includes(hub))) {
                return formatted.replace(/\s+/g, " ").trim();
            }
            return formatted.split(/\s+/).filter(word => !["hamburg", "hh"].includes(word.toLowerCase().trim())).join(" ").trim();
        }

        function getLineDesign(leg) {
            const name = (leg.line?.name || "WALK").replace(/^BUS\s+/i, "");
            if (name === "WALK") return { name, color: "#777" };
            if (name.startsWith("U")) return { name, color: "#006192" };
            if (name.startsWith("S")) return { name, color: "#2ea13d" };
            if (name.startsWith("A")) return { name, color: "#fdb913" };
            if (name.startsWith("ICE")) return { name, color: "#ffffff" };
            if (name.match(/^(RE|RB)/i)) return { name, color: "#af00af" };
            return { name, color: "#e2001a" };
        }

        async function calculateRoute(from, to, updateUrl = true) {
            if (!from || !to) return;
            State.lastFrom = from;
            State.lastTo = to;
            const status = document.getElementById("sync-status");
            status.innerText = "PLANNING...";

            try {
                const res = await fetch(`/api/planner?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`);
                const data = await res.json();

                if (updateUrl) {
                    const url = new URL(window.location);
                    url.searchParams.set('from', from);
                    url.searchParams.set('to', to);
                    window.history.pushState({}, '', url);
                }

                const offFrom = data.origin?.name || from;
                const offTo = data.destination?.name || to;
                document.getElementById("station-title").innerText = `${normalizeStationName(offFrom)} > ${normalizeStationName(offTo)}`;
                
                renderResults(data.journeys.slice(0, 4));
                status.innerText = "LIVE";
            } catch (e) { 
                status.innerText = "ERROR"; 
            }
        }

        function renderResults(journeys) {
            const board = document.getElementById("board");
            board.innerHTML = journeys.map((j, i) => {
                const first = j.legs[0];
                const last = j.legs[j.legs.length - 1];
                const duration = Math.round((new Date(last.arrival) - new Date(first.departure)) / 60000);
                const transfers = j.legs.filter(l => l.line).length - 1;

                const legs = j.legs.map(leg => {
                    const d = getLineDesign(leg);
                    const depT = new Date(leg.departure).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const arrT = new Date(leg.arrival).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const delay = leg.departureDelay ? Math.round(leg.departureDelay / 60) : 0;
                    return `
                        <div class="leg-row">
                            <div class="line" style="color: ${d.color}">${d.name}</div>
                            <div class="time">${depT}</div>
                            <div class="path">${normalizeStationName(leg.origin.name)}</div>
                            <div class="time">${arrT}</div>
                            <div class="path">${normalizeStationName(leg.destination.name)}</div>
                            <div class="delay ${delay > 0 ? 'red' : 'green'}">${delay > 0 ? '+' + delay + 'm' : 'OK'}</div>
                        </div>`;
                }).join("");

                return `<div class="journey-box"><div class="option-label">Option ${i + 1} (${duration} MIN, ${transfers} TRANSFERS)</div>${legs}</div>`;
            }).join("");
        }

        function openSearch() {
            document.getElementById("search-modal").style.display = "block";
            document.getElementById("modal-overlay").style.display = "block";
            document.getElementById("input-from").focus();
        }

        function closeSearch() {
            document.getElementById("search-modal").style.display = "none";
            document.getElementById("modal-overlay").style.display = "none";
            document.getElementById("input-from").value = "";
            document.getElementById("input-to").value = "";
        }

        function triggerSearch() {
            const f = document.getElementById("input-from").value.trim();
            const t = document.getElementById("input-to").value.trim();
            if (f && t) {
                calculateRoute(f, t);
                closeSearch();
            }
        }

        function refreshRoute() {
            if(State.lastFrom && State.lastTo) calculateRoute(State.lastFrom, State.lastTo);
        }

        document.getElementById("input-from").addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                document.getElementById("input-to").focus();
            }
        });

        document.getElementById("input-to").addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                triggerSearch();
            }
        });

        window.addEventListener("keydown", (e) => {
            const isModalOpen = document.getElementById("search-modal").style.display === "block";
            if (isModalOpen) {
                if (e.key === "Escape") closeSearch();
                if (e.key === "Enter") triggerSearch();
                return;
            }
            if (e.key.toLowerCase() === 's') { e.preventDefault(); openSearch(); }
            if (e.key.toLowerCase() === 'r') refreshRoute();
        });

        setInterval(() => {
            document.getElementById("live-clock").innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }, 1000);

        const params = new URLSearchParams(window.location.search);
        if (params.get('from') && params.get('to')) {
            calculateRoute(params.get('from'), params.get('to'), false);
        } else {
            openSearch();
        }
    </script>
</body>
</html>
